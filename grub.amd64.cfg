function load_video {
  if [ x$feature_all_video_module = xy ]; then
    insmod all_video
  else
    insmod efi_gop
    insmod efi_uga
    insmod ieee1275_fb
    insmod vbe
    insmod vga
    insmod video_bochs
    insmod video_cirrus
  fi
}

load_video
set gfxpayload=keep
insmod gzio
insmod part_gpt
insmod ext2

set default=1
set timeout=0

menuentry 'Install Rocky Linux Minimal 9' --class red --class gnu-linux --class gnu --class os {
  linuxefi /images/pxeboot/vmlinuz console=ttyS0,115200 console=tty0 inst.console inst.kdump_addon=off inst.stage2=http://192.168.122.1/iso/ inst.ks=http://192.168.122.1/install.ks
  initrdefi /images/pxeboot/initrd.img
}
